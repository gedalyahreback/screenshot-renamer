name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" 
            --title "$TAG" 
            --generate-notes

      - name: Compute SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/gedalyahreback/screenshot-renamer/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Dispatch formula update to homebrew-tools
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          curl -X POST 
            -H "Accept: application/vnd.github+json" 
            -H "Authorization: Bearer $HOMEBREW_TAP_TOKEN" 
            -H "X-GitHub-Api-Version: 2022-11-28" 
            https://api.github.com/repos/gedalyahreback/homebrew-tools/dispatches 
            --data "{"event_type":"update-formula","client_payload":{"tag":"${{ steps.sha.outputs.tag }}","sha256":"${{ steps.sha.outputs.sha256 }}"}}"
