<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Screenshot Renamer — Menu Bar Template Icon (32×32)
    Pure black on transparent, macOS template icon style.
    Aperture ring with 6 blade suggestions + scissors at centre.
    Crisp at 16×16 when halved.
  -->
  <defs>
    <!-- Clip to keep everything inside the outer ring -->
    <clipPath id="ringClip">
      <circle cx="16" cy="16" r="14.5"/>
    </clipPath>
  </defs>

  <!-- ── Outer aperture ring ── -->
  <circle cx="16" cy="16" r="13.5"
          fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- ── 6 aperture blade dividing lines (radial spokes suggesting blades) ──
       Each line goes from just inside the outer ring toward centre,
       stopping before the central scissors so it reads as blades.
       Angles: 0°, 60°, 120°, 180°, 240°, 300° -->

  <!-- Spoke at 0° (straight up) -->
  <line x1="16" y1="3.5" x2="16" y2="10"
        stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Spoke at 60° -->
  <line x1="23.79" y1="7.5" x2="19.63" y2="10.97"
        stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Spoke at 120° -->
  <line x1="23.79" y1="24.5" x2="19.63" y2="21.03"
        stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Spoke at 180° (straight down) -->
  <line x1="16" y1="28.5" x2="16" y2="22"
        stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Spoke at 240° -->
  <line x1="8.21" y1="24.5" x2="12.37" y2="21.03"
        stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Spoke at 300° -->
  <line x1="8.21" y1="7.5" x2="12.37" y2="10.97"
        stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── Inner aperture opening ring (small centre circle) ── -->
  <circle cx="16" cy="16" r="6"
          fill="none" stroke="#000000" stroke-width="1"/>

  <!-- ══════════════════════════════════════════
       SCISSORS at centre — two crossed blades
       Upper blade: from lower-left to upper-right (pointing right)
       Lower blade: from upper-left to lower-right (pointing right)
       Handle rings on the left, tips point right
  ═══════════════════════════════════════════ -->

  <!-- Upper scissor blade: left-handle-side to right-tip -->
  <!-- Blade body as a narrow path -->
  <path d="M 7 13.5 L 21.5 15.5 L 7 14.5 Z"
        fill="#000000"/>

  <!-- Lower scissor blade -->
  <path d="M 7 18.5 L 21.5 16.5 L 7 17.5 Z"
        fill="#000000"/>

  <!-- Upper handle ring -->
  <circle cx="5.5" cy="14" r="3"
          fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Lower handle ring -->
  <circle cx="5.5" cy="18" r="3"
          fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Hinge / pivot dot at centre -->
  <circle cx="16" cy="16" r="1.5" fill="#000000"/>

  <!-- ── Vertical cut line at centre ── -->
  <line x1="16" y1="11.5" x2="16" y2="20.5"
        stroke="#000000" stroke-width="1"
        stroke-linecap="round"
        stroke-dasharray="1.5,1.5"/>
</svg>
