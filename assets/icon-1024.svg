<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient for depth -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#252b4a"/>
      <stop offset="100%" stop-color="#0f1220"/>
    </radialGradient>

    <!-- Aperture blade gradient -->
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5ba3f5"/>
      <stop offset="50%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2e6aad"/>
    </linearGradient>

    <!-- Blade edge shadow -->
    <linearGradient id="bladeEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </linearGradient>

    <!-- Scissor blade metallic gradient -->
    <linearGradient id="scissorMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="35%" stop-color="#c8d0e0"/>
      <stop offset="65%" stop-color="#a0abbe"/>
      <stop offset="100%" stop-color="#7a8ba0"/>
    </linearGradient>

    <!-- Scissor blade metallic gradient 2 (mirror) -->
    <linearGradient id="scissorMetal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="35%" stop-color="#c8d0e0"/>
      <stop offset="65%" stop-color="#a0abbe"/>
      <stop offset="100%" stop-color="#7a8ba0"/>
    </linearGradient>

    <!-- Aperture circle clip -->
    <clipPath id="apertureClip">
      <circle cx="512" cy="512" r="380"/>
    </clipPath>

    <!-- Text region clip: left of cut -->
    <clipPath id="leftTextClip">
      <rect x="132" y="480" width="380" height="64"/>
    </clipPath>

    <!-- Text region clip: right of cut -->
    <clipPath id="rightTextClip">
      <rect x="512" y="480" width="380" height="64"/>
    </clipPath>

    <!-- Glow filter for cut line -->
    <filter id="cutGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft drop shadow for aperture -->
    <filter id="apertureShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner glow for aperture opening -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2540" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#0d1525" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#080e1a" stop-opacity="1"/>
    </radialGradient>

    <!-- Hinge glow -->
    <radialGradient id="hingeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc947"/>
      <stop offset="60%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#c07a00"/>
    </radialGradient>
  </defs>

  <!-- ── Background rounded rect ── -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bgGrad)"/>

  <!-- ── Subtle noise texture overlay ── -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="none"
        stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>

  <!-- ══════════════════════════════════════════
       APERTURE / SHUTTER BLADES  (6 blades)
       Blades arranged at 0°, 60°, 120°, 180°, 240°, 300°
       Each blade is a rounded parallelogram swept around centre
       Blades 2 & 5 (at 60° and 240°) are the scissor blades
  ═══════════════════════════════════════════ -->

  <g id="aperture" filter="url(#apertureShadow)">

    <!-- Blade 1 — 0° (top) -->
    <g transform="rotate(0 512 512)">
      <path d="
        M 512 512
        C 512 512, 430 370, 410 250
        C 395 168, 440 140, 512 132
        C 584 140, 629 168, 614 250
        C 594 370, 512 512, 512 512
        Z"
        fill="url(#bladeGrad)" opacity="0.92"/>
    </g>

    <!-- Blade 2 — 60° (upper-right) — SCISSOR BLADE TOP -->
    <g transform="rotate(60 512 512)">
      <path d="
        M 512 512
        C 512 512, 430 370, 410 250
        C 395 168, 440 140, 512 132
        C 584 140, 629 168, 614 250
        C 594 370, 512 512, 512 512
        Z"
        fill="url(#scissorMetal)" opacity="0.95"/>
      <!-- Scissor notch on blade 2 -->
      <path d="
        M 512 512
        L 470 380
        L 512 360
        L 554 380
        Z"
        fill="#1e3a5f" opacity="0.4"/>
    </g>

    <!-- Blade 3 — 120° (lower-right) -->
    <g transform="rotate(120 512 512)">
      <path d="
        M 512 512
        C 512 512, 430 370, 410 250
        C 395 168, 440 140, 512 132
        C 584 140, 629 168, 614 250
        C 594 370, 512 512, 512 512
        Z"
        fill="url(#bladeGrad)" opacity="0.92"/>
    </g>

    <!-- Blade 4 — 180° (bottom) -->
    <g transform="rotate(180 512 512)">
      <path d="
        M 512 512
        C 512 512, 430 370, 410 250
        C 395 168, 440 140, 512 132
        C 584 140, 629 168, 614 250
        C 594 370, 512 512, 512 512
        Z"
        fill="url(#bladeGrad)" opacity="0.92"/>
    </g>

    <!-- Blade 5 — 240° (lower-left) — SCISSOR BLADE BOTTOM -->
    <g transform="rotate(240 512 512)">
      <path d="
        M 512 512
        C 512 512, 430 370, 410 250
        C 395 168, 440 140, 512 132
        C 584 140, 629 168, 614 250
        C 594 370, 512 512, 512 512
        Z"
        fill="url(#scissorMetal2)" opacity="0.95"/>
      <!-- Scissor notch on blade 5 -->
      <path d="
        M 512 512
        L 470 380
        L 512 360
        L 554 380
        Z"
        fill="#1e3a5f" opacity="0.4"/>
    </g>

    <!-- Blade 6 — 300° (upper-left) -->
    <g transform="rotate(300 512 512)">
      <path d="
        M 512 512
        C 512 512, 430 370, 410 250
        C 395 168, 440 140, 512 132
        C 584 140, 629 168, 614 250
        C 594 370, 512 512, 512 512
        Z"
        fill="url(#bladeGrad)" opacity="0.92"/>
    </g>
  </g>

  <!-- ── Dark aperture opening (the "hole") ── -->
  <circle cx="512" cy="512" r="200" fill="url(#centerGlow)"/>

  <!-- ── Aperture ring border ── -->
  <circle cx="512" cy="512" r="380" fill="none"
          stroke="#2a3a5c" stroke-width="6"/>
  <circle cx="512" cy="512" r="380" fill="none"
          stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- ══════════════════════════════════════════
       SCISSOR GEOMETRY
       Two scissor blades crossing at centre (512, 512)
       Upper blade: from lower-left to upper-right
       Lower blade: from upper-left to lower-right
       They cross at the pivot/hinge
  ═══════════════════════════════════════════ -->

  <!-- Upper scissor blade body (NW to SE direction, top half) -->
  <path d="
    M 300 430
    L 510 508
    L 300 442
    Z"
    fill="url(#scissorMetal)" stroke="#8a9ab0" stroke-width="1"/>

  <!-- Upper scissor blade — cutting edge (tapers to a point going right) -->
  <path d="
    M 300 436
    L 510 512
    L 302 438
    Z"
    fill="#d8e2f0" stroke="none"/>

  <!-- Lower scissor blade body (SW to NE direction, bottom half) -->
  <path d="
    M 300 594
    L 510 516
    L 300 582
    Z"
    fill="url(#scissorMetal2)" stroke="#8a9ab0" stroke-width="1"/>

  <!-- Lower scissor blade — cutting edge -->
  <path d="
    M 300 588
    L 510 512
    L 302 586
    Z"
    fill="#d8e2f0" stroke="none"/>

  <!-- Scissor handles (rings) on the left -->
  <!-- Upper handle ring -->
  <circle cx="252" cy="436" r="38" fill="none"
          stroke="url(#scissorMetal)" stroke-width="14"/>
  <circle cx="252" cy="436" r="22" fill="#0d1525"/>
  <!-- Upper handle shine -->
  <path d="M 238 420 Q 246 414 258 422" fill="none"
        stroke="#e8edf5" stroke-width="3" stroke-linecap="round"/>

  <!-- Lower handle ring -->
  <circle cx="252" cy="588" r="38" fill="none"
          stroke="url(#scissorMetal2)" stroke-width="14"/>
  <circle cx="252" cy="588" r="22" fill="#0d1525"/>
  <!-- Lower handle shine -->
  <path d="M 238 572 Q 246 566 258 574" fill="none"
        stroke="#e8edf5" stroke-width="3" stroke-linecap="round"/>

  <!-- Hinge screw / pivot dot (gold) -->
  <circle cx="512" cy="512" r="18" fill="url(#hingeGlow)"/>
  <circle cx="512" cy="512" r="18" fill="none"
          stroke="#c07a00" stroke-width="2"/>
  <!-- Hinge screw slot -->
  <line x1="505" y1="505" x2="519" y2="519"
        stroke="#7a4a00" stroke-width="3" stroke-linecap="round"/>
  <line x1="519" y1="505" x2="505" y2="519"
        stroke="#7a4a00" stroke-width="2" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════
       CUT LINE  — vertical slash at x=512
  ═══════════════════════════════════════════ -->
  <line x1="512" y1="468" x2="512" y2="556"
        stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round" filter="url(#cutGlow)" opacity="0.9"/>

  <!-- Cut line glow (wider, dimmer) -->
  <line x1="512" y1="468" x2="512" y2="556"
        stroke="#a0c8ff" stroke-width="8"
        stroke-linecap="round" opacity="0.2"/>

  <!-- ══════════════════════════════════════════
       TEXT STRIP
       Clipped to the aperture opening area
  ═══════════════════════════════════════════ -->

  <!-- Dark text background strip -->
  <rect x="150" y="482" width="724" height="60" rx="4"
        fill="#080e1a" fill-opacity="0.7"
        clip-path="url(#apertureClip)"/>

  <!-- LEFT SIDE: long grey filename (fading / struck through) -->
  <g clip-path="url(#leftTextClip)">
    <text x="500" y="524"
          font-family="'SF Mono', 'Fira Mono', 'Consolas', monospace"
          font-size="36" font-weight="400"
          fill="#8892a4"
          text-anchor="end"
          letter-spacing="-0.5">Screenshot 2026-04-14…</text>
    <!-- Strikethrough line on left text -->
    <line x1="150" y1="512" x2="504" y2="512"
          stroke="#8892a4" stroke-width="2" stroke-opacity="0.6"
          stroke-dasharray="6,4"/>
  </g>

  <!-- RIGHT SIDE: clean short name in bright white -->
  <g clip-path="url(#rightTextClip)">
    <text x="522" y="524"
          font-family="'SF Mono', 'Fira Mono', 'Consolas', monospace"
          font-size="36" font-weight="700"
          fill="#ffffff"
          text-anchor="start"
          letter-spacing="-0.5">my-diagram</text>
  </g>

  <!-- ── Subtle vignette overlay ── -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="180" ry="180"
        fill="url(#vignette)" pointer-events="none"/>

  <!-- ── Gloss highlight (top edge shimmer) ── -->
  <ellipse cx="512" cy="120" rx="300" ry="80"
           fill="#ffffff" fill-opacity="0.04"/>
</svg>
